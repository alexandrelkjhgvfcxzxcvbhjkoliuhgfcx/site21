
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Simples</title>
    <style>
        body {
            background-color: #202020;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .calculadora {
            background-color: #000000;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5);
            width: 300px;
        }

        #display {
            width: 100%;
            height: 60px;
            background-color: #a7f3d0;
            color: #111827;
            text-align: right;
            font-size: 32px;
            border: none;
            border-radius: 5px;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .botoes {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 50px;
            border-radius: 5px;
            border: none;
            font-size: 20px;
            cursor: pointer;
            background-color: #374151;
            color: white;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #4b5563;
        }

        /* Cores especiais para operadores e limpar */
        button.operador {
            background-color: #f59e0b;
            color: black;
            font-weight: bold;
        }
        button.operador:hover {
            background-color: #d97706;
        }

        button.limpar {
            background-color: #ef4444;
        }
        button.limpar:hover {
            background-color: #dc2626;
        }

        button.igual {
            background-color: #10b981;
            grid-column: span 2; /* Faz o botão de igual ocupar duas colunas */
        }
        button.igual:hover {
            background-color: #059669;
        }
    </style>
</head>
<body>

    <div class="calculadora">
        <input type="text" id="display" readonly value="0">

        <div class="botoes">
            <button class="limpar" onclick="limpar()">C</button>
            <button onclick="apagarUltimo()">⌫</button>
            <button class="operador" onclick="inserir('/')">/</button>
            <button class="operador" onclick="inserir('*')">*</button>

            <button onclick="inserir('7')">7</button>
            <button onclick="inserir('8')">8</button>
            <button onclick="inserir('9')">9</button>
            <button class="operador" onclick="inserir('-')">-</button>

            <button onclick="inserir('4')">4</button>
            <button onclick="inserir('5')">5</button>
            <button onclick="inserir('6')">6</button>
            <button class="operador" onclick="inserir('+')">+</button>

            <button onclick="inserir('1')">1</button>
            <button onclick="inserir('2')">2</button>
            <button onclick="inserir('3')">3</button>
            <button onclick="inserir('.')">.</button>

            <button onclick="inserir('0')">0</button>
            <button class="igual" onclick="calcular()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        // Adiciona números ou operadores na tela
        function inserir(valor) {
            if (display.value === '0' && valor !== '.') {
                display.value = valor;
            } else {
                display.value += valor;
            }
        }

        // Limpa tudo
        function limpar() {
            display.value = '0';
        }

        // Apaga o último caractere digitado
        function apagarUltimo() {
            if (display.value.length > 1) {
                display.value = display.value.slice(0, -1);
            } else {
                display.value = '0';
            }
        }

        // Faz a conta matemática usando a função eval()
        function calcular() {
            try {
                // O eval calcula automaticamente strings matemáticas (ex: "2+5*3")
                let resultado = eval(display.value);
                
                // Evita problemas com dízimas periódicas longas (ex: 0.1 + 0.2)
                if (resultado % 1 !== 0) {
                    resultado = parseFloat(resultado.toFixed(4));
                }
                
                display.value = resultado;
            } catch (error) {
                display.value = 'Erro';
            }
        }
    </script>

</body>
</html>
